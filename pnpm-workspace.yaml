packages:
  - packages/*
  - examples/*
  - test-e2e/site
  - docs

allowBuilds:
  '@swc/core': true
  core-js: true
  core-js-pure: true
  esbuild: true
  sharp: true
  unrs-resolver: true

catalog:
  '@rust-gear/glob': 1.0.0
  '@swc/core': 1.15.41
  next: ^16.2.9
  postcss: 8.5.15
  react: ^19.2.6
  react-dom: ^19.2.6
  webpack: 5.107.2
  zss-engine: 2.3.0

minimumReleaseAgeExclude:
  - zss-engine@2.3.0

onlyBuiltDependencies:
  - '@swc/core'
